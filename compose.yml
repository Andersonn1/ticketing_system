services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketing-system-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file: ./.env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ticketing-system-postgres
    env_file: ./postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing_user -d ticketing_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ticketing-system-pgadmin
    env_file:
      - ./pgadmin.env
      - ./postgres.env
    entrypoint: ["/bin/sh", "/pgadmin-init/generate-servers.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin:/pgadmin-init:ro
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
