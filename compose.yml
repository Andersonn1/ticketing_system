services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file: ./.env
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
      - ./alembic:/app/alembic:rw
      - ./alembic.ini:/app/alembic.ini:ro
    restart: unless-stopped
    networks:
      - service_desk
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    env_file: ./postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - service_desk

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pgadmin
    env_file:
      - ./pgadmin.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin:/pgadmin-init:ro
    restart: unless-stopped
    configs:
      - source: servers
        target: /pgadmin4/servers.json
        mode: 0444
      - source: pgpass
        target: /pgpass
        uid: "5050"
        gid: "5050"
        mode: 0400
    networks:
      - service_desk
    extra_hosts:
      - "host.docker.internal:host-gateway"

configs:
  servers:
    file: ./pgadmin/servers.json
  pgpass:
    file: ./pgadmin/pgpass

networks:
  service_desk:

volumes:
  postgres_data:
  pgadmin_data:
